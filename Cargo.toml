[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.dependencies]
cyto-ibu-umi-correct = { path = "crates/cyto-ibu-umi-correct" }
cyto-ibu-barcode-correct = { path = "crates/cyto-ibu-barcode-correct" }
cyto-ibu-count = { path = "crates/cyto-ibu-count" }
cyto-ibu-sort = { path = "crates/cyto-ibu-sort" }
cyto-ibu-view = { path = "crates/cyto-ibu-view" }
cyto-core = { path = "crates/cyto-core" }
cyto-cli = { path = "crates/cyto-cli" }
cyto-view = { path = "crates/cyto-view" }
cyto-io = { path = "crates/cyto-io" }
cyto-map = { path = "crates/cyto-map" }
cyto-workflow = { path = "crates/cyto-workflow" }

anyhow = "1.0.93"
binseq = "0.6.1"
bitnuc = "0.2.11"
ibu = "0.1.0"
niffler = { version = "3.0.0", features = ["gz"] }
paraseq = "0.1.4"
parking_lot = "0.12"

[profile.release]
debug = true

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_inception = "allow"
module_name_repetitions = "allow"
cast_precision_loss = "allow"
cast_possible_truncation = "allow"
struct_field_names = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
len_without_is_empty = "allow"
