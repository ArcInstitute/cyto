[package]
name = "cyto-cli"
version = "0.2.5"
edition = "2021"

[dependencies]
clap = { version = "4.5.20", features = ["derive"] }
cyto = { path = "../cyto-core" }
anyhow = { workspace = true }
serde = { workspace = true }
bitnuc = { workspace = true }
ibu = { workspace = true, features = ["serde"] }
spinoff = "0.8.0"
csv = "1.3.1"
rayon = "1.10.0"

[features]
benchmarking = []

[[bin]]
name = "cyto"
path = "src/main.rs"

[lints]
workspace = true
