name: cyto

on: push

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    needs: [build, test, integration]
    name: CI
    runs-on: "ubuntu-latest"
    steps:
      - name: Done
        run: exit 0

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: cargo build --verbose

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: cargo test --verbose

  integration:
    name: Integration
    needs: [integration-map-crispr-fastq]
    runs-on: "ubuntu-latest"
    steps:
      - name: Done
        run: exit 0

  build-binary:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v3
      - name: Build Binary
        run: cargo build --release -p cyto
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyto-binary-${{ matrix.os }}
          path: target/release/cyto
          retention-days: 1

  integration-map-crispr-fastq:
    name: Integration map CRISPR (fastq)
    needs: [build-binary]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v3
      - uses: taiki-e/install-action@just
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cyto-binary-${{ matrix.os }}
          path: .
      - name: make binary executable
        run: chmod +x cyto
      - name: add binary to PATH
        run: export PATH=$PATH:$(pwd)
      - name: run test
        run: just run-crispr
