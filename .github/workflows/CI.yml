name: cyto

on: push

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    needs: [build, test, linting, integration]
    name: CI
    runs-on: "ubuntu-latest"
    steps:
      - name: Done
        run: exit 0

  linting:
    name: Linting
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - name: Run linting
        run: cargo clippy --verbose

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: cargo build --verbose

  test:
    name: Test
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: cargo test --verbose

  integration:
    name: Integration
    needs:
      [
        integration-map-crispr,
        integration-map-gex,
        integration-wf-crispr,
        integration-wf-gex,
      ]
    runs-on: "ubuntu-latest"
    steps:
      - name: Done
        run: exit 0

  build-binary:
    name: Build Binary
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - name: Build Binary
        run: cargo build --release -p cyto
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyto-binary
          path: target/release/cyto
          retention-days: 1

  integration-map-crispr:
    name: Integration map CRISPR (${{ matrix.format }})
    needs: [build-binary]
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        format: ["fastq", "bq", "vbq", "cbq"]
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cyto-binary
          path: .
      - name: make binary executable
        run: chmod +x cyto
      - name: run test (${{ matrix.format }}-${{ matrix.probe }})
        run: |
          export CYTO_LOG=trace
          if [ "${{ matrix.format }}" = "fastq" ]; then
            INPUT_FILES="./data/sequencing/crispr_R1.fastq.gz ./data/sequencing/crispr_R2.fastq.gz"
          else
            INPUT_FILES="./data/sequencing/crispr.${{ matrix.format }}"
          fi

          PROBE_FLAG="-p ./data/metadata/probe-barcodes-fixed-rna-profiling.txt"

          ./cyto map crispr \
            -c ./data/libraries/crispr_guides.tsv \
            $PROBE_FLAG \
            --force \
            $INPUT_FILES

  integration-map-gex:
    name: Integration map GEX (${{ matrix.format }})
    needs: [build-binary]
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        format: ["fastq", "bq", "vbq", "cbq"]
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cyto-binary
          path: .
      - name: make binary executable
        run: chmod +x cyto
      - name: run test (${{ matrix.format }}-${{ matrix.probe }})
        run: |
          export CYTO_LOG=trace
          if [ "${{ matrix.format }}" = "fastq" ]; then
            INPUT_FILES="./data/sequencing/gex_R1.fastq.gz ./data/sequencing/gex_R2.fastq.gz"
          else
            INPUT_FILES="./data/sequencing/gex.${{ matrix.format }}"
          fi

          PROBE_FLAG="-p ./data/metadata/probe-barcodes-fixed-rna-profiling.txt"

          ./cyto map gex \
            -c ./data/libraries/gex_probes.tsv \
            $PROBE_FLAG \
            --force \
            $INPUT_FILES

  integration-wf-crispr:
    name: Integration workflow CRISPR (${{ matrix.format }})
    needs: [build-binary]
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        format: ["fastq", "bq", "vbq", "cbq"]
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cyto-binary
          path: .
      - name: make binary executable
        run: chmod +x cyto
      - name: run test (${{ matrix.format }}-${{ matrix.probe }})
        run: |
          export CYTO_LOG=trace
          if [ "${{ matrix.format }}" = "fastq" ]; then
            INPUT_FILES="./data/sequencing/crispr_R1.fastq.gz ./data/sequencing/crispr_R2.fastq.gz"
          else
            INPUT_FILES="./data/sequencing/crispr.${{ matrix.format }}"
          fi

          PROBE_FLAG="-p ./data/metadata/probe-barcodes-fixed-rna-profiling.txt"

          ./cyto workflow crispr \
            -c ./data/libraries/crispr_guides.tsv \
            $PROBE_FLAG \
            -w ./data/metadata/737K-fixed-rna-profiling.txt.gz \
            -T 1 \
            --sort-in-memory \
            --force \
            $INPUT_FILES

  integration-wf-gex:
    name: Integration workflow GEX (${{ matrix.format }})
    needs: [build-binary]
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        format: ["fastq", "bq", "vbq", "cbq"]
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cyto-binary
          path: .
      - name: make binary executable
        run: chmod +x cyto
      - name: run test (${{ matrix.format }}-${{ matrix.probe }})
        run: |
          export CYTO_LOG=trace
          if [ "${{ matrix.format }}" = "fastq" ]; then
            INPUT_FILES="./data/sequencing/gex_R1.fastq.gz ./data/sequencing/gex_R2.fastq.gz"
          else
            INPUT_FILES="./data/sequencing/gex.${{ matrix.format }}"
          fi

          PROBE_FLAG="-p ./data/metadata/probe-barcodes-fixed-rna-profiling.txt"

          ./cyto workflow gex \
            -c ./data/libraries/gex_probes.tsv \
            $PROBE_FLAG \
            -w ./data/metadata/737K-fixed-rna-profiling.txt.gz \
            -T 1 \
            --sort-in-memory \
            --force \
            $INPUT_FILES
