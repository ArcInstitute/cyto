      - name: make binary executable
        run: chmod +x cyto
      - name: run test (fastq)
        run: |
          ./cyto map gex \
            -i ./data/sequencing/gex_R1.fastq.gz \
            -I ./data/sequencing/gex_R2.fastq.gz \
            -c ./data/libraries/gex_probes.tsv \
            --force
      - name: run test (binseq)
        run: |
          ./cyto map gex \
            -b ./data/sequencing/gex.bq \
            -c ./data/libraries/gex_probes.tsv \
            --force
      - name: run test (fastq-probe)
        run: |
          ./cyto map gex \
