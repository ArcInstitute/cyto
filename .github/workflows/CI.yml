    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        format: ["fastq", "bq", "vbq", "cbq"]
    steps:
      - uses: actions/checkout@v3
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cyto-binary
          path: .
      - name: make binary executable
        run: chmod +x cyto
      - name: run detect gex (${{ matrix.format }})
        run: |
          if [ "${{ matrix.format }}" = "fastq" ]; then
            INPUT_FILES="./data/sequencing/gex_R1.fastq.gz ./data/sequencing/gex_R2.fastq.gz"
          else
            INPUT_FILES="./data/sequencing/gex.${{ matrix.format }}"
          fi

          OUTPUT=$(./cyto detect gex \
            -c ./data/libraries/gex_probes.tsv \
            -w ./data/metadata/737K-fixed-rna-profiling.txt.gz \
            -p ./data/metadata/probe-barcodes-fixed-rna-profiling.txt \
            $INPUT_FILES)

          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Detected geometry:"
          echo "$OUTPUT" | grep -q "\[barcode\]\[umi:12\]"
          echo "$OUTPUT" | grep -q "\[gex\]"
          echo "$OUTPUT" | grep -q "\[probe\]"

