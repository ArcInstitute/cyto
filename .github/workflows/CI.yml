          ./cyto map crispr \
            -c ./data/libraries/crispr_guides.tsv \
            -w ./data/metadata/737K-fixed-rna-profiling.txt.gz \
            --geometry "[barcode][umi:12] | [:26][anchor][protospacer]" \
            --force \
            ./data/sequencing/crispr.cbq

