            -c ./data/libraries/gex_probes.tsv \
            -w ./data/metadata/737K-fixed-rna-profiling.txt.gz \
            --geometry "[barcode][umi:12] | [gex]" \
            --force \
            ./data/sequencing/gex.cbq

  integration-wf-crispr-unprobed:
